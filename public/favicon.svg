<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- Gradient for road -->
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Gradient for accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle with rounded corners -->
  <rect x="5" y="5" width="90" height="90" rx="20" ry="20" fill="url(#bg)"/>
  
  <!-- Outer border -->
  <rect x="5" y="5" width="90" height="90" rx="20" ry="20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  
  <!-- Road lines - main vertical road -->
  <rect x="46" y="20" width="8" height="60" rx="2" fill="#334155"/>
  
  <!-- Road center line (dashed) -->
  <line x1="50" y1="25" x2="50" y2="35" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="42" x2="50" y2="58" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="50" y2="75" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Horizontal connecting roads -->
  <rect x="20" y="35" width="26" height="6" rx="1" fill="#334155"/>
  <rect x="54" y="55" width="26" height="6" rx="1" fill="#334155"/>
  
  <!-- Connection points (intersections) -->
  <circle cx="50" cy="38" r="5" fill="url(#accent)"/>
  <circle cx="50" cy="58" r="5" fill="url(#accent)"/>
  
  <!-- Map pin / location marker -->
  <path d="M68 22 C68 18 65 15 61 15 C57 15 54 18 54 22 C54 26 61 35 61 35 C61 35 68 26 68 22 Z" fill="#ef4444"/>
  <circle cx="61" cy="22" r="3" fill="white"/>
</svg>
