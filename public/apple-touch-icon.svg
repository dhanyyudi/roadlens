<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background with iOS rounded corners -->
  <rect x="10" y="10" width="160" height="160" rx="40" ry="40" fill="url(#bg)"/>
  
  <!-- Main vertical road -->
  <rect x="82" y="40" width="16" height="100" rx="4" fill="#334155"/>
  
  <!-- Road center dashed line -->
  <line x1="90" y1="50" x2="90" y2="65" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="75" x2="90" y2="105" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="115" x2="90" y2="130" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Horizontal roads -->
  <rect x="40" y="65" width="42" height="10" rx="2" fill="#334155"/>
  <rect x="98" y="100" width="42" height="10" rx="2" fill="#334155"/>
  
  <!-- Intersection circles -->
  <circle cx="90" cy="70" r="8" fill="url(#accent)"/>
  <circle cx="90" cy="105" r="8" fill="url(#accent)"/>
  
  <!-- Location pin -->
  <path d="M125 45 C125 39 121 35 115 35 C109 35 105 39 105 45 C105 51 115 65 115 65 C115 65 125 51 125 45 Z" fill="#ef4444"/>
  <circle cx="115" cy="45" r="4" fill="white"/>
</svg>
